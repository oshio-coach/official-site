<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>小さな変化のストーリー｜Shiori</title>
  <meta name="description" content="カードセッションを受けた方の小さな変化のストーリーをご紹介します。感じ方や変化のペースは人それぞれです。" />

  <style>
    :root {
      --white: #fcfbf8;
      --true-white: #ffffff;
      --text: #252525;
      --soft-text: #6f6a64;
      --line: #e7e2dc;
      --orange: #d99a5b;
      --orange-dark: #b9783f;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
      background: var(--white);
      color: var(--text);
      line-height: 1.9;
      letter-spacing: 0.05em;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    img {
      width: 100%;
      display: block;
      border-radius: 28px;
      box-shadow: 0 18px 50px rgba(40, 40, 40, 0.08);
    }

    header {
      padding: 28px 22px;
      border-bottom: 1px solid var(--line);
    }

    .nav {
      max-width: 1080px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-size: 15px;
      letter-spacing: 0.16em;
      font-weight: 600;
    }

    .nav-links {
      display: none;
      gap: 24px;
      font-size: 12px;
      letter-spacing: 0.16em;
      font-weight: 600;
    }

    .hero {
      padding: 92px 22px 64px;
      text-align: center;
    }

    .hero h1 {
      font-family: "Hiragino Mincho ProN", "Yu Mincho", serif;
      font-size: clamp(34px, 7vw, 58px);
      font-weight: 400;
      line-height: 1.6;
      margin-bottom: 24px;
    }

    .hero p {
      color: var(--soft-text);
      max-width: 680px;
      margin: 0 auto;
      font-size: 15px;
    }

    section {
      padding: 34px 18px;
    }

    .container {
      max-width: 1040px;
      margin: 0 auto;
    }

    .story {
      margin-bottom: 42px;
    }

    .note {
      max-width: 760px;
      margin: 70px auto 20px;
      padding: 34px 26px;
      background: var(--true-white);
      border: 1px solid var(--line);
      border-radius: 28px;
      color: var(--soft-text);
      font-size: 14px;
    }

    .note h2 {
      font-family: "Hiragino Mincho ProN", "Yu Mincho", serif;
      color: var(--text);
      font-weight: 400;
      text-align: center;
      margin-bottom: 20px;
      font-size: 24px;
    }

    .cta {
      text-align: center;
      padding: 54px 22px 80px;
    }

    .button {
      display: inline-block;
      width: min(100%, 340px);
      padding: 15px 24px;
      border-radius: 999px;
      background: var(--orange);
      color: #fff;
      font-weight: 600;
      text-align: center;
    }

    footer {
      padding: 40px 22px;
      text-align: center;
      font-size: 13px;
      color: var(--soft-text);
      border-top: 1px solid var(--line);
    }

    @media (min-width: 760px) {
      .nav-links {
        display: flex;
      }

      section {
        padding: 42px 22px;
      }
    }
  </style>
</head>

<body>

  <header>
    <nav class="nav">
      <a class="logo" href="index.html">SHIORI</a>
      <div class="nav-links">
        <a href="index.html">HOME</a>
        <a href="session.html">SESSION</a>
        <a href="voice.html">VOICE</a>
        <a href="profile.html">PROFILE</a>
        <a href="blog.html">BLOG</a>
      </div>
    </nav>
  </header>

  <main>

    <div class="hero">
      <h1>小さな変化の<br>ストーリー</h1>
      <p>
        人生は、ある日突然変わるものではありません。<br>
        でも、夜が少しずつ明けるように、心にも少しずつ変化が訪れていきます。
      </p>
    </div>

    <section>
      <div class="container">
        <div class="story">
          <img src="voice1.png" alt="会社員 Sさん 30代の変化のストーリー">
        </div>

        <div class="story">
          <img src="voice2.png" alt="主婦 Kさん 40代の変化のストーリー">
        </div>

        <div class="story">
          <img src="voice3.png" alt="2児の母 Nさん 30代の変化のストーリー">
        </div>

        <div class="story">
          <img src="voice4.png" alt="フリーランス Nさん 30代の変化のストーリー">
        </div>

        <div class="story">
          <img src="voice-last.png" alt="あなたにもあなたのペースで">
        </div>

        <div class="note">
          <h2>ご覧いただく前に</h2>
          <p>
            掲載している内容は、実際にいただいたご感想をもとに構成しています。
          </p>
          <p>
            感じ方や変化のペースには個人差があります。
          </p>
          <p>
            あなたのペースを大切にしながら、一緒に歩んでいけたら嬉しいです。
          </p>
        </div>
      </div>
    </section>

    <div class="cta">
      <a class="button" href="session.html">カードセッションを見る</a>
    </div>

  </main>

  <footer>
    <p>人生って、もっと楽しくていい。</p>
    <p>&copy; 2026 Shiori</p>
  </footer>

</body>
</html>
